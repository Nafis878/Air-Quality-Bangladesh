# ============================================================================
# Forecasting-study configuration (consumed by src/modeling).
# Leakage-safe: temporal splits + train-only scaler; test used once for reporting.
# ============================================================================

clean_parquet: "data/processed/air_quality_clean.parquet"
data_config: "config.yaml"          # reuse split boundaries from the pipeline config

seq_len: 24
horizons: [1, 6, 24]
quantiles: [0.1, 0.5, 0.9]

# Station set is resolved from TRAIN coverage (see channels.resolve_station_set).
station_min_train_obs_rate: 0.30
station_min_test_obs_rate: 0.05

# Anchor subsampling (controls dataset size / compute). stride=1 uses every hour.
stride:
  train: 3        # every 3rd hour as an anchor (cuts train windows ~3x; documented)
  val: 1
  test: 1

# Training
d_model: 64
n_heads: 4
batch_size: 128
lr: 0.001
max_epochs: 30
patience: 5             # early stop on val masked-quantile loss

# Fair fight: every model predicts a correction on top of the persistence anchor (= the persistence
# floor), applied uniformly outside the network, so a GAMMA win reflects architecture not a prior.
use_anchor: true
# GAMMA spatial graph (the uniquely-cross-station capability)
spatial_layers: 2          # multi-hop station message passing
use_staleness_gate: true   # fusion gate sees self-staleness -> routes to neighbours when own data is stale
# Pre-registered staleness strata (hours since the station last reported PM2.5): fresh <=1 /
# moderate 2-6 / stale 7..seq_len-1 / self_blackout >=seq_len (no PM2.5 in the input window).
staleness_bins: [1, 6]
# GAMMA (proposed model) trains on a denser anchor stride than the baselines because its
# cross-section formulation yields ~5x fewer anchors; keeps gradient-step budget comparable.
gamma_stride: 1
gamma_max_epochs: 30
grad_clip: 1.0
seeds: [0, 1, 2, 3, 4]  # >=5 seeds

# Quick smoke mode (overrides applied by run.py --quick)
quick:
  stride: {train: 48, val: 24, test: 24}
  max_epochs: 2
  seeds: [0]
  gamma_stride: 24
  gamma_max_epochs: 2

paths:
  checkpoints: "results/checkpoints"
  tables: "results/tables"
  figures: "results/figures"
  report: "results/methods_results.md"
